name: B봇 (6~10위 담당)

on:
  schedule:
    - cron: '*/5 * * * *' # 🚨 A봇과 반드시 똑같은 시간으로 맞춰주세요!
  workflow_dispatch:

jobs:
  run-bot-b:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 세팅
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: B봇 실행 (6위~10위 요약)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }} # 🚨 2번 열쇠!
        run: python nowly_master_B.py
