name: A봇 (1~5위 담당)

on:
  schedule:
    - cron: '*/15 * * * *' # 30분마다 실행 (원하시는 시간으로 변경 가능)
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  run-bot-a:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: A봇 실행 (1위~5위 요약)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY }} # 🚨 1번 열쇠!
        run: python nowly_master_A.py
